### C++ — Async TCP server

\`\`\`cpp
#include <boost/asio.hpp>
#include <iostream>

using boost::asio::ip::tcp;

class Session : public std::enable_shared_from_this<Session> {
public:
    explicit Session(tcp::socket socket) : socket_(std::move(socket)) {}

    void start() {
        auto self = shared_from_this();
        boost::asio::async_read_until(socket_, buffer_, "\\n",
            [this, self](boost::system::error_code ec, std::size_t len) {
                if (!ec) {
                    std::string msg(
                        boost::asio::buffers_begin(buffer_.data()),
                        boost::asio::buffers_begin(buffer_.data()) + len);
                    std::cout << "Received: " << msg;
                    start(); // keep reading
                }
            });
    }

private:
    tcp::socket socket_;
    boost::asio::streambuf buffer_;
};
\`\`\`

### Python — HTTP client

\`\`\`python
import asyncio
import aiohttp

async def fetch(url: str) -> str:
    """Fetch a URL and return its body text."""
    async with aiohttp.ClientSession() as session:
        async with session.get(url) as resp:
            resp.raise_for_status()
            return await resp.text()

async def main():
    urls = [
        "https://www.boost.org",
        "https://www.boost.org/doc/libs/",
    ]
    results = await asyncio.gather(*[fetch(u) for u in urls])
    for url, body in zip(urls, results):
        print(f"{url}: {len(body)} bytes")

asyncio.run(main())
\`\`\`

  function resetEditor(ta) {
    const wrapper = ta.closest('[data-wysiwyg="v3"]');
    if (wrapper) {
      const toolbar = wrapper.querySelector('.wysiwyg-editor__toolbar');
      const body = wrapper.querySelector('.wysiwyg-editor__body');
      if (toolbar) toolbar.innerHTML = '';
      if (body) body.innerHTML = '';
      wrapper.querySelectorAll('.wysiwyg-table-context, .wysiwyg-editor__markdown-pane, .wysiwyg-editor__preview').forEach(el => el.remove());
      ta.style.position = '';
      ta.style.left = '';
      ta.style.width = '';
      ta.style.height = '';
      ta.removeAttribute('aria-hidden');
      ta.tabIndex = 0;
    }
    import('/static/js/vendor/wysiwyg-editor/wysiwyg-editor.js').then(m => m.initWysiwyg('id_demo_content'));
  }

  document.getElementById('wysiwyg-demo-fill')?.addEventListener('click', () => {
    const ta = document.getElementById('id_demo_content');
    if (!ta) return;
    ta.value = DEMO_MARKDOWN;
    resetEditor(ta);
  });

  document.getElementById('wysiwyg-demo-clear')?.addEventListener('click', () => {
    const ta = document.getElementById('id_demo_content');
    if (!ta) return;
    ta.value = '';
    resetEditor(ta);
  });

  // Load and init WYSIWYG on page load so the editor is ready without clicking Fill demo content
  import('/static/js/vendor/wysiwyg-editor/wysiwyg-editor.js').then(m => m.initWysiwyg('id_demo_content'));
